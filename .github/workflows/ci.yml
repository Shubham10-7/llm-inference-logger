name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Build Frontend ──────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run build
        env:
          VITE_CHATBOT_URL: http://localhost:3001
          VITE_INGESTION_URL: http://localhost:4000

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ── Lint Backend ────────────────────────────────────────────────
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check ingestion
        working-directory: backend/ingestion
        run: |
          npm ci
          node --check index.js
          echo "✅ Ingestion OK"

      - name: Check SDK
        working-directory: backend/sdk
        run: |
          npm ci
          node --check logger.js
          echo "✅ SDK OK"

      - name: Check chatbot
        working-directory: backend/chatbot
        run: |
          npm ci
          node --check index.js
          echo "✅ Chatbot OK"

  # ── Docker Build (no push) ──────────────────────────────────────
  docker-build:
    name: Docker Build Check
    needs: [lint-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build ingestion image
        run: docker build -t ingestion-test ./backend/ingestion

      - name: Build chatbot image
        run: docker build -t chatbot-test -f backend/chatbot/Dockerfile .

      - name: Build frontend image
        run: docker build -t frontend-test ./frontend
