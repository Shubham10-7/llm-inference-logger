version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: inference_logs
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d inference_logs"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  ingestion:
    build:
      context: ./backend/ingestion
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://admin:secret@postgres:5432/inference_logs
      REDIS_URL: redis://redis:6379
      PORT: 4000
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  chatbot:
    build:
      context: .
      dockerfile: backend/chatbot/Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://admin:secret@postgres:5432/inference_logs
      REDIS_URL: redis://redis:6379
      INGESTION_URL: http://ingestion:4000
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      PORT: 3001
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ingestion:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_CHATBOT_URL: ${VITE_CHATBOT_URL:-http://localhost:3001}
        VITE_INGESTION_URL: ${VITE_INGESTION_URL:-http://localhost:4000}
    ports:
      - "3000:3000"
    depends_on:
      - chatbot
      - ingestion
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
