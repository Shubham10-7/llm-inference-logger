apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: llm-logger
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: llm-logger
spec:
  replicas: 1
  selector:
    matchLabels: {app: postgres}
  template:
    metadata:
      labels: {app: postgres}
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        env:
        - {name: POSTGRES_DB, value: inference_logs}
        - {name: POSTGRES_USER, value: admin}
        - {name: POSTGRES_PASSWORD, valueFrom: {secretKeyRef: {name: pg-secret, key: password}}}
        ports: [{containerPort: 5432}]
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        - name: init
          mountPath: /docker-entrypoint-initdb.d
      volumes:
      - name: data
        persistentVolumeClaim: {claimName: postgres-pvc}
      - name: init
        configMap: {name: pg-init}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: llm-logger
spec:
  selector: {app: postgres}
  ports: [{port: 5432}]
