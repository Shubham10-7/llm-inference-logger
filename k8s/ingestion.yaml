apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion
  namespace: llm-logger
spec:
  replicas: 2
  selector:
    matchLabels: {app: ingestion}
  template:
    metadata:
      labels: {app: ingestion}
    spec:
      containers:
      - name: ingestion
        image: llm-logger/ingestion:latest
        ports: [{containerPort: 4000}]
        env:
        - {name: DATABASE_URL, valueFrom: {secretKeyRef: {name: app-secrets, key: database-url}}}
        - {name: REDIS_URL, valueFrom: {secretKeyRef: {name: app-secrets, key: redis-url}}}
        resources:
          requests: {cpu: 100m, memory: 128Mi}
          limits: {cpu: 500m, memory: 512Mi}
        livenessProbe:
          httpGet: {path: /health, port: 4000}
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet: {path: /health, port: 4000}
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ingestion
  namespace: llm-logger
spec:
  selector: {app: ingestion}
  ports: [{port: 4000}]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ingestion-hpa
  namespace: llm-logger
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ingestion
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target: {type: Utilization, averageUtilization: 70}
